name: Validate

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*

      - name: Validate userscript syntax
        run: node --check chatgpt-thread-toolkit.user.js

      - name: Validate extension content script syntax
        run: node --check extension/content.js

      - name: Validate popup script syntax
        run: node --check extension/popup.js

      - name: Validate manifest JSON
        run: node -e "JSON.parse(require('fs').readFileSync('extension/manifest.json', 'utf8'));"

      - name: Package extension zip
        run: pwsh -File scripts/package-extension.ps1 -OutputPath output/chatgpt-thread-toolkit-extension.zip
