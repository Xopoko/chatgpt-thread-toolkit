name: Validate

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  userscript:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*

      - name: Validate userscript syntax
        run: node --check chatgpt-thread-toolkit.user.js
